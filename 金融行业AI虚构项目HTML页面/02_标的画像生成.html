<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标的画像生成工作台</title>
  <style>
    :root{--bg:#f1f4f7;--panel:#fff;--ink:#142230;--muted:#647482;--line:#d8e1e8;--soft:#f5f8fa;--blue:#19605f;--blue2:#e3f3f1;--green:#167356;--green2:#e8f6ef;--amber:#a86512;--amber2:#fff4df;--red:#b83232;--red2:#fff0f0;--shadow:0 16px 36px rgba(30,66,78,.11);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}.wrap{min-height:100vh;display:grid;grid-template-columns:310px minmax(0,1fr) 340px;gap:0}.panel{border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow)}.left,.right{height:100vh;position:sticky;top:0;display:flex;flex-direction:column;overflow:hidden}.left{border-width:0 1px 0 0;background:#132a32;color:#edf8f8}.right{border-width:0 0 0 1px}.brand{padding:18px;border-bottom:1px solid rgba(255,255,255,.12)}.brand strong{display:block;font-size:18px}.brand span,.muted{color:var(--muted);font-size:12px}.brand span{color:#9eb9bf}.search{padding:14px;border-bottom:1px solid rgba(255,255,255,.12)}.input,.select,.textarea{width:100%;border:1px solid var(--line);border-radius:4px;padding:10px 11px;background:#fff}.left .input,.left .select{border-color:#2f4b54;color:#edf8f8;background:#0f2028}.textarea{min-height:124px;line-height:1.6;resize:vertical}.input:focus,.select:focus,.textarea:focus{outline:2px solid #b9dedb;border-color:#75aaa5}.targets{padding:12px;overflow:auto}.target{width:100%;display:block;margin-bottom:9px;border:1px solid #2f4b54;border-left:5px solid #3c6670;border-radius:4px;padding:11px;text-align:left;color:#edf8f8;background:#10242c}.target.active,.target:hover{border-color:#4c8b91;border-left-color:#7fd0c7;background:#183843}.target strong{display:block;font-size:14px}.target p{margin:5px 0;color:#9eb9bf;font-size:12px;line-height:1.5}.tag{display:inline-flex;border-radius:4px;padding:3px 8px;font-size:12px;font-weight:700}.ok{color:var(--green);background:var(--green2)}.warn{color:var(--amber);background:var(--amber2)}.bad{color:var(--red);background:var(--red2)}.info{color:var(--blue);background:var(--blue2)}.main{min-width:0;padding:18px}.top{display:flex;justify-content:space-between;gap:16px;margin-bottom:14px}.top h1{margin:0 0 5px;font-size:24px}.top p{margin:0;color:var(--muted);font-size:13px}.user{min-width:220px;border:1px solid var(--line);border-radius:4px;padding:10px 12px;background:#fff}.compose{display:grid;grid-template-columns:minmax(0,1fr) 150px;gap:10px;margin-bottom:14px}.btn{border:1px solid var(--line);border-radius:4px;padding:9px 12px;font-weight:700;background:#fff}.primary{border-color:var(--blue);color:#fff;background:var(--blue)}.ghost{color:#344054}.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(--line)}.tab{border:0;border-bottom:3px solid transparent;padding:10px 14px;color:#50606d;background:transparent}.tab.active{border-bottom-color:var(--blue);color:var(--blue);background:transparent}.profile{display:grid;grid-template-columns:1.12fr .88fr;gap:14px}.card{border:1px solid var(--line);border-radius:4px;background:#fff}.card h2,.card h3{margin:0;padding:13px 14px;border-bottom:1px solid var(--line);font-size:15px;background:#f8fbfc}.card-body{padding:14px}.kv{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.kv div{padding:10px;border:1px solid #e5ecef;border-radius:4px;background:var(--soft)}.kv span{display:block;color:var(--muted);font-size:12px}.kv strong{display:block;margin-top:4px;font-size:14px}.summary{margin:0;color:#344054;font-size:13px;line-height:1.7}.bars{display:grid;gap:10px}.bar-row{display:grid;grid-template-columns:86px minmax(0,1fr) 64px;align-items:center;gap:10px;font-size:12px}.bar{height:10px;border-radius:3px;background:#e8eef2;overflow:hidden}.bar i{display:block;height:100%;background:var(--blue)}.timeline{display:grid;gap:10px}.event{display:grid;grid-template-columns:86px minmax(0,1fr) auto;gap:10px;padding:10px;border:1px solid #e5ecef;border-radius:4px}.event time{color:var(--muted);font-size:12px}.event strong{display:block;font-size:13px}.event p{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.5}.source,.todo{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid #e5ecef}.source:last-child,.todo:last-child{border-bottom:0}.source strong,.todo strong{display:block;font-size:13px}.source span,.todo span{color:var(--muted);font-size:12px}.mini{border:1px solid var(--line);border-radius:3px;padding:5px 8px;color:var(--blue);font-size:12px;background:#fff}.side-section{padding:14px;border-bottom:1px solid var(--line)}.side-section h3{margin:0 0 10px;font-size:14px}.toast{position:fixed;right:20px;bottom:20px;padding:11px 14px;border-radius:4px;color:#fff;background:#132a32;opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}@media(max-width:1180px){.wrap{grid-template-columns:280px minmax(0,1fr)}.right{position:static;height:auto;grid-column:1/-1}.profile{grid-template-columns:1fr}}@media(max-width:760px){.wrap{display:block}.main{padding:10px}.left{position:static;height:auto;margin-bottom:12px}.top,.compose,.profile,.kv{display:block}.user,.card,.right{margin-top:10px}}
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel left">
      <div class="brand"><strong>标的画像生成</strong><span>权益研究部 · 主体档案台</span></div>
      <div class="search">
        <input class="input" id="keyword" value="宁德时代 300750" placeholder="股票代码、公司名称或债券主体">
        <select class="select" id="statusFilter" style="margin-top:8px"><option value="all">全部状态</option><option value="已生成">已生成</option><option value="需复核">需复核</option><option value="待更新">待更新</option></select>
      </div>
      <div class="targets" id="targetList"></div>
    </aside>
    <main class="main">
      <header class="top">
        <div><h1 id="title">主体档案</h1><p id="desc">生成投研画像、复核证据来源，并沉淀可复用晨会摘要。</p></div>
        <div class="user"><strong>陈分析师</strong><br><span class="muted">权益研究部 · 新能源组</span></div>
      </header>
      <section class="compose">
        <textarea class="textarea" id="prompt">围绕宁德时代生成最新投研画像，重点关注储能订单、海外政策、毛利率修复和晨会问题。</textarea>
        <button class="btn primary" id="generateBtn">生成画像</button>
      </section>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-view="profile">主体档案</button>
        <button class="tab" data-view="finance">财务趋势</button>
        <button class="tab" data-view="events">事件时间线</button>
        <button class="tab" data-view="sources">证据复核</button>
      </nav>
      <section class="profile" id="content"></section>
    </main>
    <aside class="panel right">
      <div class="side-section"><h3>当前标的</h3><div id="currentBox"></div></div>
      <div class="side-section"><h3>待复核字段</h3><div id="todoBox"></div></div>
      <div class="side-section"><h3>版本记录</h3><div id="auditBox"></div></div>
    </aside>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const data=[{id:"catl",name:"宁德时代",code:"300750",status:"已生成",type:"A股",industry:"动力电池/储能",score:"中",version:"v3",owner:"陈分析师",summary:"动力电池份额保持领先，储能业务贡献提升；海外政策、原材料价格和毛利率修复是当前画像的复核重点。",finance:[["营业收入","4008亿",86],["归母净利","507亿",72],["经营现金流","689亿",78],["毛利率","22.9%",58]],events:[["06-18","储能订单增长","北美储能订单排产延长至四季度。","关注"],["06-12","欧洲产能投放","德国基地二期进入爬坡阶段。","利好"],["06-05","高管增持完成","核心高管增持计划完成。","中性"]],sources:[["2025 年年度报告","财务数据 P32-P58","已引用"],["机构调研纪要","储能业务问答","已引用"],["海外政策库","本地化条款影响","待复核"]],todos:[["海外政策影响","出口收入假设需复核"],["储能订单数据","新增订单需入库"],["晨会摘要","16:00 前提交"]],audit:["10:07 画像 v3 生成完成","09:58 财报与调研纪要解析完成","09:40 公告库同步完成"]},{id:"byd",name:"比亚迪",code:"002594",status:"需复核",type:"A股",industry:"新能源车/电池",score:"中",version:"v5",owner:"陈分析师",summary:"新能源车销量保持高位，出口与高端车型贡献提升；价格竞争、渠道库存和海外关税为主要跟踪项。",finance:[["营业收入","6022亿",90],["归母净利","365亿",62],["经营现金流","711亿",76],["毛利率","20.1%",50]],events:[["06-20","海外销量提升","东南亚与欧洲区域销量增长较快。","利好"],["06-14","车型价格调整","部分主力车型终端优惠扩大。","关注"],["06-08","电池外供推进","储能与动力电池外供客户增加。","利好"]],sources:[["月度产销快报","销量数据","已引用"],["新闻舆情","终端折扣","待复核"],["政策库","海外关税假设","待更新"]],todos:[["终端折扣数据","多来源口径不一致"],["海外关税假设","政策库新增条款"]],audit:["09:48 风险事项标记为需复核","09:42 月度销量数据更新","09:36 画像 v5 自动更新"]},{id:"longi",name:"隆基绿能",code:"601012",status:"待更新",type:"A股",industry:"光伏组件",score:"高",version:"v2",owner:"王研究员",summary:"组件价格低位运行，产能出清进度和现金流改善是画像更新重点。",finance:[["营业收入","1294亿",54],["归母净利","83亿",34],["经营现金流","92亿",42],["毛利率","14.2%",31]],events:[["06-17","产能调整","部分老旧产线停产改造。","关注"],["06-10","组件价格下行","产业链报价连续下调。","负面"]],sources:[["行业周报","组件价格","待更新"],["公司公告","产能调整","已引用"],["年度报告","库存与减值","已引用"]],todos:[["行业报价","周报数据已过期"],["库存减值假设","需查看最新附注"]],audit:["昨日 18:20 画像 v2 归档","昨日 17:55 行业周报完成解析"]}];
    const state={id:"catl",view:"profile"};const $=s=>document.querySelector(s);const cls=s=>s==="已生成"||s==="已引用"||s==="利好"?"ok":s==="需复核"||s==="待复核"||s==="关注"?"warn":s==="待更新"||s==="负面"?"bad":"info";const cur=()=>data.find(x=>x.id===state.id)||data[0];function tag(s){return `<span class="tag ${cls(s)}">${s}</span>`}function toast(s){const t=$("#toast");t.textContent=s;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1800)}
    function renderList(){const kw=$("#keyword").value.trim().toLowerCase(),st=$("#statusFilter").value;$("#targetList").innerHTML=data.filter(x=>(st==="all"||x.status===st)&&(!kw||`${x.name} ${x.code} ${x.industry}`.toLowerCase().includes(kw))).map(x=>`<button class="target ${x.id===state.id?"active":""}" data-id="${x.id}"><strong>${x.name} ${x.code}</strong><p>${x.industry} · ${x.version}</p>${tag(x.status)}</button>`).join("")||"<p class='muted'>未找到匹配标的。</p>";document.querySelectorAll(".target").forEach(b=>b.onclick=()=>{state.id=b.dataset.id;render();toast("已切换标的")})}
    function profile(x){return `<article class="card"><h2>画像摘要</h2><div class="card-body"><p class="summary">${x.summary}</p><div class="kv" style="margin-top:12px"><div><span>主体类型</span><strong>${x.type}</strong></div><div><span>所属行业</span><strong>${x.industry}</strong></div><div><span>风险评分</span><strong>${x.score}</strong></div><div><span>画像版本</span><strong>${x.version}</strong></div></div></div></article><article class="card"><h2>画像生成草稿</h2><div class="card-body"><textarea class="textarea" id="draft">${x.name}：当前结论聚焦行业位置、财务趋势、经营事件、风险事项和可追踪证据。建议晨会讨论估值区间与风险假设。</textarea><button class="btn primary" id="archiveBtn" style="margin-top:10px">归档当前版本</button></div></article>`}
    function finance(x){return `<article class="card" style="grid-column:1/-1"><h2>财务趋势</h2><div class="card-body bars">${x.finance.map(r=>`<div class="bar-row"><strong>${r[0]}</strong><div class="bar"><i style="width:${r[2]}%"></i></div><span>${r[1]}</span></div>`).join("")}</div></article>`}
    function events(x){return `<article class="card" style="grid-column:1/-1"><h2>经营事件时间线</h2><div class="card-body timeline">${x.events.map(e=>`<div class="event"><time>${e[0]}</time><div><strong>${e[1]}</strong><p>${e[2]}</p></div>${tag(e[3])}</div>`).join("")}</div></article>`}
    function sources(x){return `<article class="card" style="grid-column:1/-1"><h2>证据来源与复核状态</h2><div class="card-body">${x.sources.map(s=>`<div class="source"><div><strong>${s[0]}</strong><span>${s[1]}</span></div>${tag(s[2])}</div>`).join("")}</div></article>`}
    function renderSide(x){$("#currentBox").innerHTML=`<strong>${x.name} ${x.code}</strong><p class="muted">${x.industry} · ${x.owner}</p>${tag(x.status)}`;$("#todoBox").innerHTML=x.todos.map(t=>`<div class="todo"><div><strong>${t[0]}</strong><span>${t[1]}</span></div><button class="mini">处理</button></div>`).join("");$("#auditBox").innerHTML=x.audit.map(a=>`<p class="muted">${a}</p>`).join("")}
    function render(){const x=cur();$("#title").textContent=state.view==="profile"?"主体档案":state.view==="finance"?"财务趋势":state.view==="events"?"事件时间线":"证据复核";document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===state.view));$("#content").innerHTML=state.view==="profile"?profile(x):state.view==="finance"?finance(x):state.view==="events"?events(x):sources(x);renderList();renderSide(x);$("#archiveBtn")?.addEventListener("click",()=>{x.status="已生成";x.audit.unshift("刚刚 画像版本已归档");render();toast("画像版本已归档")});document.querySelectorAll(".mini").forEach(b=>b.onclick=()=>toast("已打开复核任务"))}
    document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{state.view=t.dataset.view;render()});$("#generateBtn").onclick=()=>{const v=$("#keyword").value;const hit=data.find(x=>v.includes(x.name)||v.includes(x.code));if(hit)state.id=hit.id;cur().status="需复核";cur().audit.unshift("刚刚 根据输入生成画像草稿");state.view="profile";render();toast("画像草稿已生成，等待复核")};$("#keyword").oninput=renderList;$("#statusFilter").onchange=renderList;render();
  </script>
</body>
</html>
