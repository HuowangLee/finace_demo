<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交易对手风险监测指挥台</title>
  <style>
    :root{--bg:#eef3f5;--panel:#ffffff;--ink:#13242a;--muted:#64747a;--line:#d5e0e4;--soft:#f4f8f9;--blue:#1d6a78;--blue2:#e3f4f6;--green:#16805d;--green2:#e4f4ec;--amber:#a87012;--amber2:#fff4dd;--red:#b5403b;--red2:#fff0ef;--shadow:0 12px 28px rgba(30,74,84,.12);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,select,input{font:inherit}button{cursor:pointer}.page{min-height:100vh;padding:0 18px 18px;background:linear-gradient(180deg,#dfeaec 0,#eef3f5 138px)}.top{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px;align-items:end;padding:20px 0 16px}.top h1{margin:0 0 5px;font-size:25px}.muted{color:var(--muted);font-size:12px}.user{border:1px solid rgba(255,255,255,.45);border-radius:6px;padding:11px 12px;background:rgba(255,255,255,.76)}.layout{display:grid;grid-template-columns:320px minmax(0,1fr) 330px;gap:16px}.panel{border:1px solid var(--line);border-radius:6px;background:#fff;box-shadow:var(--shadow);overflow:hidden}.panel h2,.panel h3{margin:0;padding:13px 14px;border-bottom:1px solid var(--line);font-size:15px;background:#f4fafb}.body{padding:14px}.select,.input{width:100%;border:1px solid var(--line);border-radius:4px;padding:9px 10px;background:#fff}.party{width:100%;margin-top:9px;border:1px solid var(--line);border-left:5px solid #a5c6cc;border-radius:4px;padding:10px;text-align:left;background:#fff}.party.active,.party:hover{border-color:#8dbbc2;border-left-color:var(--blue);background:var(--blue2)}.party strong{display:block}.party p{margin:5px 0;color:var(--muted);font-size:12px;line-height:1.5}.tag{display:inline-flex;border-radius:4px;padding:3px 8px;font-size:12px;font-weight:700}.ok{color:var(--green);background:var(--green2)}.warn{color:var(--amber);background:var(--amber2)}.bad{color:var(--red);background:var(--red2)}.info{color:var(--blue);background:var(--blue2)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.metric{border:1px solid var(--line);border-radius:6px;padding:13px;background:#fff}.metric span{display:block;color:var(--muted);font-size:12px}.metric strong{display:block;margin-top:5px;font-size:22px}.desk{display:grid;grid-template-columns:1fr 1fr;gap:16px}.profile{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field{padding:10px;border:1px solid #e5edef;border-radius:4px;background:var(--soft)}.field span{display:block;color:var(--muted);font-size:12px}.field strong{display:block;margin-top:5px}.event{display:grid;grid-template-columns:82px minmax(0,1fr) auto;gap:9px;padding:10px;border:1px solid #e5edef;border-radius:4px;margin-bottom:8px;background:#fff}.event time{color:var(--muted);font-size:12px}.event strong{font-size:13px}.event p{margin:4px 0 0;color:var(--muted);font-size:12px}.exposure{display:grid;gap:10px}.barrow{display:grid;grid-template-columns:92px minmax(0,1fr) 70px;gap:10px;align-items:center;font-size:12px}.bar{height:10px;border-radius:3px;background:#e7eef1;overflow:hidden}.bar i{display:block;height:100%;background:var(--blue)}.relation{min-height:270px;position:relative;border:1px solid var(--line);border-radius:4px;background:#f8fbfc}.node{position:absolute;width:116px;border:1px solid var(--line);border-radius:4px;padding:8px;text-align:center;background:#fff}.node.main{border-color:#84bac2;background:var(--blue2)}.node.risk{border-color:#dda19d;background:var(--red2)}.line{position:absolute;height:3px;border-radius:0;background:#9bb7bd;transform-origin:left center}.advice{border:1px solid #e5edef;border-left:4px solid var(--blue);border-radius:4px;padding:10px;margin-bottom:8px;background:#fff}.advice strong{font-size:13px}.advice p{margin:4px 0 0;color:var(--muted);font-size:12px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.btn{border:1px solid var(--line);border-radius:4px;padding:8px 11px;font-weight:700;background:#fff}.primary{border-color:var(--blue);color:#fff;background:var(--blue)}.audit p{margin:0;padding:8px 0;border-bottom:1px solid #e5edef;color:#52666b;font-size:12px}.toast{position:fixed;right:20px;bottom:20px;padding:11px 14px;border-radius:4px;color:#fff;background:#13242a;opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}@media(max-width:1180px){.layout{grid-template-columns:280px minmax(0,1fr)}.side{grid-column:1/-1}.desk{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.layout,.top,.metrics,.profile{display:block}.panel,.metric,.user{margin-bottom:10px}.relation{min-height:auto}.node{position:static;margin:10px}.line{display:none}}
  </style>
</head>
<body>
  <div class="page">
    <header class="top"><div><h1>交易对手风险监测指挥台</h1><p class="muted">持续跟踪机构主体风险事件、授信敞口、关联关系和处置建议。</p></div><div class="user"><strong>风险监测岗</strong><br><span class="muted">全国性商业银行 · 金融市场部</span></div></header>
    <section class="layout">
      <aside class="panel"><h2>重点交易对手</h2><div class="body"><select class="select" id="riskFilter"><option value="all">全部风险层级</option><option value="高">高风险</option><option value="中">中风险</option><option value="低">低风险</option></select><div id="partyList"></div></div></aside>
      <main>
        <div class="metrics" id="metrics"></div>
        <section class="desk">
          <article class="panel"><h2>主体风险档案</h2><div class="body profile" id="profile"></div></article>
          <article class="panel"><h2>授信 / 持仓 / 交易敞口</h2><div class="body exposure" id="exposure"></div></article>
          <article class="panel"><h2>风险事件时间线</h2><div class="body" id="events"></div></article>
          <article class="panel"><h2>关联关系</h2><div class="body"><div class="relation" id="relation"></div></div></article>
        </section>
      </main>
      <aside class="panel side"><h2>处置建议</h2><div class="body"><div id="advice"></div><div class="actions"><button class="btn primary" id="focusBtn">标记重点关注</button><button class="btn" id="levelBtn">调整风险层级</button><button class="btn" id="reviewBtn">提交额度复核</button></div><h3 style="border:0;padding:16px 0 8px">风险留痕</h3><div class="audit" id="audit"></div></div></aside>
    </section>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const parties=[{id:"c1",name:"华北城投集团",risk:"高",rating:"AA-",limit:"8.2亿",holding:"3.4亿",trade:"1.1亿",status:"暂停新增",summary:"评级展望下调叠加债务展期传闻，需暂停新增交易并复核存量敞口。",fields:{主体类型:"城投平台",授信状态:"存量压降",评级展望:"负面",预警来源:"评级/舆情/司法"},exposure:[["授信额度",82,"已用 8.2 亿"],["债券持仓",46,"余额 3.4 亿"],["票据业务",24,"余额 1.1 亿"],["衍生品敞口",18,"净额 0.6 亿"]],events:[["06-21","评级展望下调","评级机构将展望由稳定调为负面。","高"],["06-18","债务展期传闻","多家媒体提及区域平台债务协商。","中"],["06-12","司法冻结","子公司股权被司法冻结。","中"]],advice:[["暂停新增交易","触发负面展望和舆情组合规则。"],["提交额度复核","建议将授信额度由 10 亿下调至 6 亿。"],["补充担保措施","存量持仓需确认抵质押覆盖率。"]],audit:["10:22 命中评级展望下调规则","10:18 舆情事件完成归并","09:55 授信台账同步完成"]},{id:"c2",name:"东南证券股份",risk:"中",rating:"AAA",limit:"15亿",holding:"5.8亿",trade:"2.4亿",status:"限制部分业务",summary:"整体资质稳定，但资管子公司涉及诉讼，需限制相关资管产品交易。",fields:{主体类型:"券商",授信状态:"正常复核",评级展望:"稳定",预警来源:"司法/公告"},exposure:[["授信额度",64,"已用 9.6 亿"],["债券持仓",38,"余额 5.8 亿"],["同业交易",44,"余额 2.4 亿"],["资管产品",52,"限制新增"]],events:[["06-20","子公司诉讼","资管子公司涉及合同纠纷。","中"],["06-10","年报披露","净资本指标保持监管要求以上。","低"]],advice:[["限制资管产品新增","诉讼事项明确前不新增关联资管交易。"],["维持主体额度","母公司资质稳定，暂不下调总额度。"]],audit:["09:40 司法数据同步","09:32 资管产品限制建议生成"]}];
    const state={id:"c1"};const $=s=>document.querySelector(s);const cur=()=>parties.find(p=>p.id===state.id)||parties[0];const cls=s=>s==="低"||s==="正常"?"ok":s==="中"?"warn":s==="高"?"bad":"info";function tag(s){return `<span class="tag ${cls(s)}">${s}</span>`}function toast(s){const t=$("#toast");t.textContent=s;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1800)}
    function list(){const f=$("#riskFilter").value;$("#partyList").innerHTML=parties.filter(p=>f==="all"||p.risk===f).map(p=>`<button class="party ${p.id===state.id?"active":""}" data-id="${p.id}"><strong>${p.name}</strong><p>${p.summary}</p>${tag(p.risk)} ${tag(p.status)}</button>`).join("");document.querySelectorAll(".party").forEach(b=>b.onclick=()=>{state.id=b.dataset.id;render();toast("已切换交易对手")})}
    function relation(p){$("#relation").innerHTML=`<div class="line" style="left:135px;top:88px;width:150px;transform:rotate(18deg)"></div><div class="line" style="left:135px;top:88px;width:150px;transform:rotate(-20deg)"></div><div class="line" style="left:270px;top:172px;width:122px;transform:rotate(-16deg)"></div><div class="node main" style="left:24px;top:78px"><strong>${p.name}</strong><span>监测主体</span></div><div class="node risk" style="left:235px;top:38px"><strong>担保企业</strong><span>偿债压力</span></div><div class="node" style="left:235px;top:164px"><strong>控股股东</strong><span>股权质押</span></div><div class="node risk" style="left:430px;top:126px"><strong>关联债务链</strong><span>展期传闻</span></div>`}
    function render(){const p=cur();$("#metrics").innerHTML=[["风险层级",p.risk,"当前评分"],["外部评级",p.rating,"最新评级"],["授信占用",p.limit,"台账同步"],["交易状态",p.status,"处置策略"]].map(m=>`<div class="metric"><span>${m[0]}</span><strong>${m[1]}</strong><span>${m[2]}</span></div>`).join("");$("#profile").innerHTML=Object.entries(p.fields).map(([k,v])=>`<div class="field"><span>${k}</span><strong>${v}</strong></div>`).join("");$("#exposure").innerHTML=p.exposure.map(e=>`<div class="barrow"><strong>${e[0]}</strong><div class="bar"><i style="width:${e[1]}%"></i></div><span>${e[2]}</span></div>`).join("");$("#events").innerHTML=p.events.map(e=>`<div class="event"><time>${e[0]}</time><div><strong>${e[1]}</strong><p>${e[2]}</p></div>${tag(e[3])}</div>`).join("");relation(p);$("#advice").innerHTML=`<p>${p.summary}</p>${p.advice.map(a=>`<div class="advice"><strong>${a[0]}</strong><p>${a[1]}</p></div>`).join("")}`;$("#audit").innerHTML=p.audit.map(a=>`<p>${a}</p>`).join("");list()}
    $("#riskFilter").onchange=list;$("#focusBtn").onclick=()=>{cur().status="重点关注";cur().audit.unshift("刚刚 已标记重点关注");render();toast("已标记重点关注")};$("#levelBtn").onclick=()=>{cur().risk=cur().risk==="高"?"中":"高";cur().audit.unshift("刚刚 风险层级已调整");render();toast("风险层级已调整")};$("#reviewBtn").onclick=()=>{cur().audit.unshift("刚刚 已提交额度复核");render();toast("额度复核已提交")};render();
  </script>
</body>
</html>
