<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机构知识助手工作台</title>
  <style>
    :root{--bg:#f7f6f2;--panel:#fffdf8;--ink:#232a24;--muted:#6d746f;--line:#ddd9ce;--soft:#f4f2ea;--blue:#496b55;--blue2:#e9f0e8;--green:#157a56;--green2:#e8f6ef;--amber:#a86512;--amber2:#fff3df;--red:#b83232;--red2:#fff0f0;--shadow:0 14px 30px rgba(61,75,54,.1);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,textarea,select,input{font:inherit}button{cursor:pointer}.page{min-height:100vh;display:grid;grid-template-columns:300px minmax(0,1fr) 340px;gap:14px;padding:16px}.panel{border:1px solid var(--line);border-radius:6px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}.panel h2,.panel h3{margin:0;padding:13px 14px;border-bottom:1px solid var(--line);font-size:15px;background:#f6f3eb}.body{padding:14px}.left,.right{height:calc(100vh - 32px);position:sticky;top:16px;display:flex;flex-direction:column}.brand{padding:16px;border-bottom:1px solid var(--line);background:#eef0e8}.brand strong{display:block;font-size:19px}.muted,.brand span{color:var(--muted);font-size:12px}.select,.input,.textarea{width:100%;border:1px solid var(--line);border-radius:4px;padding:9px 10px;background:#fffdf8}.textarea{min-height:116px;line-height:1.6;resize:vertical}.quick{padding:12px;border-bottom:1px solid var(--line)}.result{width:100%;margin-bottom:8px;border:1px solid var(--line);border-left:4px solid #b7c4b0;border-radius:4px;padding:10px;text-align:left;background:#fffdf8}.result.active,.result:hover{border-color:#a9baa2;border-left-color:var(--blue);background:var(--blue2)}.result strong{display:block}.result p{margin:5px 0;color:var(--muted);font-size:12px;line-height:1.5}.tag{display:inline-flex;border-radius:4px;padding:3px 8px;font-size:12px;font-weight:700}.ok{color:var(--green);background:var(--green2)}.warn{color:var(--amber);background:var(--amber2)}.bad{color:var(--red);background:var(--red2)}.info{color:var(--blue);background:var(--blue2)}.main{min-width:0}.top{display:flex;justify-content:space-between;gap:16px;margin-bottom:14px}.top h1{margin:0 0 5px;font-size:24px}.user{min-width:230px;border:1px solid var(--line);border-radius:4px;padding:10px 12px;background:#fffdf8}.qa{display:grid;grid-template-columns:1fr 180px;gap:10px;margin-bottom:14px;padding:12px;border:1px solid var(--line);border-radius:6px;background:#fffdf8}.btn{border:1px solid var(--line);border-radius:4px;padding:9px 12px;font-weight:700;background:#fffdf8}.primary{border-color:var(--blue);color:#fff;background:var(--blue)}.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(--line)}.tab{border:0;border-bottom:3px solid transparent;padding:10px 14px;background:transparent}.tab.active{border-bottom-color:var(--blue);color:var(--blue);background:transparent}.workspace{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.answer{font-size:14px;line-height:1.8;color:#39433c}.source{padding:10px;border:1px solid #e8e3d7;border-radius:4px;margin-bottom:8px;background:#fffdf8}.source strong{display:block;font-size:13px}.source span{display:block;margin-top:4px;color:var(--muted);font-size:12px}.role{display:grid;grid-template-columns:92px minmax(0,1fr) auto;gap:9px;align-items:start;padding:10px;border:1px solid #e8e3d7;border-radius:4px;margin-bottom:8px;background:#fffdf8}.role strong{font-size:13px}.role p{margin:4px 0 0;color:var(--muted);font-size:12px}.maintain{display:grid;gap:8px}.task{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:10px;border:1px solid #e8e3d7;border-radius:4px;background:#fffdf8}.task strong{display:block;font-size:13px}.task span{color:var(--muted);font-size:12px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.audit p{margin:0;padding:8px 0;border-bottom:1px solid #e8e3d7;color:#5d655f;font-size:12px}.toast{position:fixed;right:20px;bottom:20px;padding:11px 14px;border-radius:4px;color:#fff;background:#232a24;opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}@media(max-width:1180px){.page{grid-template-columns:280px minmax(0,1fr)}.right{position:static;height:auto;grid-column:1/-1}.workspace{grid-template-columns:1fr}}@media(max-width:760px){.page,.top,.qa{display:block;padding:10px}.left{position:static;height:auto;margin-bottom:10px}.user,.panel{margin-bottom:10px}}
  </style>
</head>
<body>
  <div class="page">
    <aside class="panel left">
      <div class="brand"><strong>机构知识助手</strong><span>总行运营管理部 · 制度问答</span></div>
      <div class="quick"><select class="select" id="roleFilter"><option value="all">全部岗位</option><option value="客服经理">客服经理</option><option value="柜面运营">柜面运营</option><option value="后台审批">后台审批</option></select></div>
      <div class="body" id="resultList" style="overflow:auto"></div>
    </aside>
    <main class="main">
      <header class="top"><div><h1>可溯源制度问答</h1><p class="muted">按岗位生成标准答复，保留制度来源、版本和复核动作。</p></div><div class="user"><strong>制度管理员</strong><br><span class="muted">银行总行 · 运营管理部</span></div></header>
      <section class="qa"><textarea class="textarea" id="question">客户购买理财产品后申请赎回失败，客服经理应该如何解释并发起处理？</textarea><button class="btn primary" id="answerBtn">生成标准答复</button></section>
      <nav class="tabs"><button class="tab active" data-view="answer">标准答复</button><button class="tab" data-view="trace">制度溯源</button><button class="tab" data-view="roles">岗位口径</button><button class="tab" data-view="maintain">知识维护</button></nav>
      <section class="workspace" id="workspace"></section>
    </main>
    <aside class="panel right"><h2>版本与复核</h2><div class="body"><div id="metaBox"></div><div class="actions"><button class="btn primary" id="publishBtn">发布答案</button><button class="btn" id="reviewBtn">提交制度复核</button></div><h3 style="border:0;padding:16px 0 8px">问答留痕</h3><div class="audit" id="audit"></div></div></aside>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const items=[{id:"q1",title:"理财赎回失败如何处理",role:"客服经理",domain:"理财业务",status:"待复核",confidence:"86%",version:"V2026.05",date:"2026-05-18",question:"客户购买理财产品后申请赎回失败，客服经理应该如何解释并发起处理？",answer:"先核对产品是否处于开放赎回期、客户账户状态、份额确认状态和当日系统批量处理时间。若属于产品规则限制，应按产品说明书解释预计开放日；若属于账户或系统异常，应创建工单并关联客户交易流水、产品代码和错误提示截图。",sources:[["理财产品赎回处理规程","V2026.05 · 第 12-16 条","已引用"],["客户服务标准话术","V2026.03 · 理财赎回章节","已引用"],["异常工单处理手册","V2025.12 · 工单字段要求","待复核"]],roles:[["客服经理","可解释赎回规则并创建工单。","适用"],["柜面运营","可协助核对账户状态和份额确认。","适用"],["客户经理","不得承诺收益或提前到账。","受限"]],tasks:[["复核工单字段","手册版本较旧，需确认是否有新增字段"],["更新话术版本","客服中心反馈低置信度 4 次"]],audit:["10:24 标准答复生成","10:20 命中 3 条制度来源","09:50 制度库同步完成"]},{id:"q2",title:"开户资料缺失补正",role:"柜面运营",domain:"账户管理",status:"已发布",confidence:"94%",version:"V2026.04",date:"2026-04-22",question:"企业客户开户时缺少受益所有人材料，柜面如何处理？",answer:"柜面应暂停开户提交，按企业客户尽调要求补充受益所有人身份证明、股权结构材料和授权文件；资料补正完成后重新发起尽调复核。",sources:[["企业客户开户规程","V2026.04 · 第 8 条","已引用"],["受益所有人识别指引","V2026.02 · 第 4-7 条","已引用"]],roles:[["柜面运营","可补正材料并重新提交。","适用"],["后台审批","可复核尽调结果。","适用"],["客服经理","仅可提示客户联系开户网点。","受限"]],tasks:[["下线旧问答","旧版开户材料清单仍被引用"]],audit:["昨日 16:10 答案已发布","昨日 15:58 审批岗完成复核"]}];
    const state={id:"q1",view:"answer",ready:false};const $=s=>document.querySelector(s);const cur=()=>items.find(i=>i.id===state.id)||items[0];const cls=s=>s==="已发布"||s==="已引用"||s==="适用"?"ok":s==="待复核"||s==="待更新"?"warn":s==="需更新"||s==="受限"?"bad":"info";function tag(s){return `<span class="tag ${cls(s)}">${s}</span>`}function toast(s){const t=$("#toast");t.textContent=s;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1800)}
    function list(){const r=$("#roleFilter").value;$("#resultList").innerHTML=items.filter(i=>r==="all"||i.role===r).map(i=>`<button class="result ${i.id===state.id?"active":""}" data-id="${i.id}"><strong>${i.title}</strong><p>${i.role} · ${i.domain} · 置信度 ${i.confidence}</p>${tag(i.status)}</button>`).join("");document.querySelectorAll(".result").forEach(b=>b.onclick=()=>{state.id=b.dataset.id;$("#question").value=cur().question;render();toast("已切换知识问答")})}
    function answer(i){return `<article class="panel"><h2>标准答复草稿</h2><div class="body"><p class="answer">${state.ready?i.answer:"点击生成标准答复后，系统会按岗位权限合并制度、流程、模板和历史问答。"}</p><div class="actions"><button class="btn primary" id="copyBtn">采用当前答复</button><button class="btn" id="editBtn">标记需维护</button></div></div></article><article class="panel"><h2>引用片段</h2><div class="body">${i.sources.slice(0,2).map(s=>`<div class="source"><strong>${s[0]}</strong><span>${s[1]}</span>${tag(s[2])}</div>`).join("")}</div></article>`}
    function trace(i){return `<article class="panel" style="grid-column:1/-1"><h2>制度溯源</h2><div class="body">${i.sources.map(s=>`<div class="source"><strong>${s[0]}</strong><span>${s[1]}</span>${tag(s[2])}</div>`).join("")}</div></article>`}
    function roles(i){return `<article class="panel" style="grid-column:1/-1"><h2>岗位口径</h2><div class="body">${i.roles.map(r=>`<div class="role"><strong>${r[0]}</strong><p>${r[1]}</p>${tag(r[2])}</div>`).join("")}</div></article>`}
    function maintain(i){return `<article class="panel" style="grid-column:1/-1"><h2>知识维护事项</h2><div class="body maintain">${i.tasks.map(t=>`<div class="task"><div><strong>${t[0]}</strong><span>${t[1]}</span></div><button class="btn">处理</button></div>`).join("")}</div></article>`}
    function render(){const i=cur();document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===state.view));$("#workspace").innerHTML=state.view==="answer"?answer(i):state.view==="trace"?trace(i):state.view==="roles"?roles(i):maintain(i);$("#metaBox").innerHTML=`<p><strong>${i.title}</strong></p><p class="muted">${i.role} · ${i.domain}</p>${tag(i.status)} ${tag("置信度 "+i.confidence)}<div class="source" style="margin-top:12px"><strong>制度版本</strong><span>${i.version} · 生效 ${i.date}</span></div>`;$("#audit").innerHTML=i.audit.map(a=>`<p>${a}</p>`).join("");list();$("#copyBtn")?.addEventListener("click",()=>toast("当前答复已采用"));$("#editBtn")?.addEventListener("click",()=>{i.status="待复核";i.audit.unshift("刚刚 已标记为知识维护事项");render();toast("已标记需维护")});document.querySelectorAll(".task .btn").forEach(b=>b.onclick=()=>toast("已打开维护任务"))}
    document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{state.view=t.dataset.view;render()});$("#answerBtn").onclick=()=>{const hit=items.find(i=>$("#question").value.includes(i.title.slice(0,4))||$("#question").value.includes(i.domain));if(hit)state.id=hit.id;state.ready=true;cur().audit.unshift("刚刚 标准答复已生成");state.view="answer";render();toast("标准答复已生成")};$("#publishBtn").onclick=()=>{cur().status="已发布";cur().audit.unshift("刚刚 答案已发布到对应岗位");render();toast("答案已发布")};$("#reviewBtn").onclick=()=>{cur().status="待复核";cur().audit.unshift("刚刚 已提交制度管理员复核");render();toast("已提交制度复核")};$("#roleFilter").onchange=list;render();
  </script>
</body>
</html>
