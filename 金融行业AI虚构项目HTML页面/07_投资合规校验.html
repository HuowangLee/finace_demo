<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投资合规规则校验台</title>
  <style>
    :root{--bg:#f7f8fa;--panel:#fff;--ink:#1b2430;--muted:#6a7280;--line:#d8dde5;--soft:#f2f4f7;--blue:#384861;--blue2:#eef2f7;--green:#19755a;--green2:#e6f3ed;--amber:#ad7116;--amber2:#fff4dc;--red:#bd3831;--red2:#fff0ef;--shadow:0 12px 28px rgba(35,45,61,.1);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,textarea,select{font:inherit}button{cursor:pointer}.page{min-height:100vh;display:grid;grid-template-columns:310px minmax(0,1fr) 340px;gap:12px;padding:14px}.panel{border:1px solid var(--line);border-radius:4px;background:#fff;box-shadow:var(--shadow);overflow:hidden}.panel h2,.panel h3{margin:0;padding:12px 14px;border-bottom:1px solid var(--line);font-size:15px;background:#f7f8fa}.body{padding:14px}.left,.right{height:calc(100vh - 28px);position:sticky;top:14px;display:flex;flex-direction:column}.brand{padding:16px;border-bottom:1px solid var(--line);background:#202b3a;color:#fff}.brand strong{display:block;font-size:19px}.muted,.brand span{color:var(--muted);font-size:12px}.brand span{color:#cbd3df}.select,.textarea{width:100%;border:1px solid var(--line);border-radius:3px;padding:9px 10px;background:#fff}.textarea{min-height:120px;line-height:1.6;resize:vertical}.filter{padding:12px;border-bottom:1px solid var(--line)}.task{width:100%;margin-bottom:8px;border:1px solid var(--line);border-left:5px solid #aab3c0;border-radius:3px;padding:10px;text-align:left;background:#fff}.task.active,.task:hover{border-color:#aab5c5;border-left-color:var(--blue);background:var(--blue2)}.task strong{display:block}.task p{margin:5px 0;color:var(--muted);font-size:12px;line-height:1.5}.tag{display:inline-flex;border-radius:3px;padding:3px 8px;font-size:12px;font-weight:700}.ok{color:var(--green);background:var(--green2)}.warn{color:var(--amber);background:var(--amber2)}.bad{color:var(--red);background:var(--red2)}.info{color:var(--blue);background:var(--blue2)}.main{min-width:0}.top{display:flex;justify-content:space-between;gap:16px;margin-bottom:12px}.top h1{margin:0 0 5px;font-size:24px}.user{min-width:230px;border:1px solid var(--line);border-radius:3px;padding:10px 12px;background:#fff}.command{display:grid;grid-template-columns:1fr 170px;gap:10px;margin-bottom:12px}.btn{border:1px solid var(--line);border-radius:3px;padding:9px 12px;font-weight:700;background:#fff}.primary{border-color:#202b3a;color:#fff;background:#202b3a}.danger{border-color:var(--red);color:#fff;background:var(--red)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.rule{display:grid;grid-template-columns:28px minmax(0,1fr) auto;gap:9px;align-items:start;padding:10px;border:1px solid #e4e8ef;border-radius:3px;margin-bottom:8px;background:#fff}.rule i{display:grid;width:28px;height:28px;place-items:center;border-radius:3px;color:#fff;font-style:normal;background:var(--blue)}.rule.block i{background:var(--red)}.rule.warn i{background:var(--amber)}.rule strong{font-size:13px}.rule p{margin:4px 0 0;color:var(--muted);font-size:12px}.clause{border:1px solid #e4e8ef;border-radius:3px;padding:10px;margin-bottom:8px;background:#fff}.clause strong{display:block;font-size:13px}.clause span{display:block;margin-top:5px;color:var(--muted);font-size:12px;line-height:1.5}.tree{border:1px solid var(--line);border-radius:3px;padding:10px;background:var(--soft)}.tree-row{display:grid;grid-template-columns:24px minmax(0,1fr) auto;gap:8px;align-items:start;padding:8px;border-bottom:1px solid #e1e5ec}.tree-row:last-child{border-bottom:0}.tree-row b{display:grid;width:24px;height:24px;place-items:center;border-radius:3px;color:#fff;background:var(--blue);font-size:12px}.result{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.box{padding:10px;border:1px solid #e4e8ef;border-radius:3px;background:var(--soft)}.box span{display:block;color:var(--muted);font-size:12px}.box strong{display:block;margin-top:5px;font-size:16px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.audit p{margin:0;padding:8px 0;border-bottom:1px solid #e4e8ef;color:#4f5968;font-size:12px}.toast{position:fixed;right:20px;bottom:20px;padding:11px 14px;border-radius:3px;color:#fff;background:#202b3a;opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}@media(max-width:1180px){.page{grid-template-columns:280px minmax(0,1fr)}.right{position:static;height:auto;grid-column:1/-1}.grid{grid-template-columns:1fr}}@media(max-width:760px){.page,.top,.command,.result{display:block;padding:10px}.left{position:static;height:auto}.panel,.user,.box{margin-bottom:10px}}
  </style>
</head>
<body>
  <div class="page">
    <aside class="panel left">
      <div class="brand"><strong>投资合规校验</strong><span>合规风控部 · 规则解释台</span></div>
      <div class="filter"><select class="select" id="statusFilter"><option value="all">全部结果</option><option value="阻断">阻断</option><option value="预警">预警</option><option value="通过">通过</option></select></div>
      <div class="body" id="taskList" style="overflow:auto"></div>
    </aside>
    <main class="main">
      <header class="top"><div><h1>规则校验解释台</h1><p class="muted">校验交易指令，展示命中规则、来源条款、处理建议和审计依据。</p></div><div class="user"><strong>合规复核岗</strong><br><span class="muted">公募基金公司 · 合规风控部</span></div></header>
      <section class="command"><textarea class="textarea" id="command"></textarea><button class="btn primary" id="runBtn">运行校验</button></section>
      <section class="result" id="summary"></section>
      <section class="grid" style="margin-top:14px">
        <article class="panel"><h2>命中规则</h2><div class="body" id="rules"></div></article>
        <article class="panel"><h2>来源条款</h2><div class="body" id="clauses"></div></article>
        <article class="panel"><h2>规则命中树</h2><div class="body"><div class="tree" id="tree"></div></div></article>
        <article class="panel"><h2>合规解释草稿</h2><div class="body"><textarea class="textarea" id="explain"></textarea><div class="actions"><button class="btn primary" id="explainBtn">生成合规解释</button><button class="btn" id="reviewBtn">提交复核</button></div></div></article>
      </section>
    </main>
    <aside class="panel right"><h2>处理动作</h2><div class="body"><div class="actions"><button class="btn primary" id="passBtn">放行任务</button><button class="btn danger" id="blockBtn">阻断任务</button></div><h3 style="border:0;padding:16px 0 8px">校验留痕</h3><div class="audit" id="audit"></div></div></aside>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const tasks=[{id:"cm1",title:"买入新能源转债",status:"阻断",product:"混合成长一号",command:"混合成长一号拟买入新能源转债 3000 万，买入后单券占基金净值 8.4%。",result:{校验结果:"阻断",命中规则:"3 条",处理建议:"退回修改"},rules:[["单券集中度限制","阻断","买入后单券占净值 8.4%，超过基金合同 5% 限制。"],["转债投资范围","通过","标的属于合同允许的可转债范围。"],["关联交易检查","通过","未命中关联方名单。"]],clauses:[["基金合同 第 12.3 条","单一证券市值不得超过基金资产净值的 5%。","已引用"],["内部风控制度 第 4.2 条","触发集中度上限时交易前阻断。","已引用"]],tree:[["交易指令","新能源转债 3000 万","info"],["投资范围","合同允许","ok"],["集中度","8.4% > 5%","bad"],["结论","交易前阻断","bad"]],explain:"该交易买入后单券集中度将达到 8.4%，超过基金合同约定的 5% 上限，系统建议交易前阻断并退回投资经理调整数量。",audit:["10:31 运行交易前校验","10:31 命中集中度阻断规则","10:30 接收交易指令"]},{id:"cm2",title:"增持政策性金融债",status:"预警",product:"固收增强二号",command:"固收增强二号拟买入 24 国开 05，金额 5000 万，买入后久期提升 0.4 年。",result:{校验结果:"预警",命中规则:"2 条",处理建议:"人工确认"},rules:[["投资范围","通过","政策性金融债属于允许范围。"],["久期偏离","预警","组合久期接近内部预警阈值。"],["禁投名单","通过","未命中禁投名单。"]],clauses:[["投资协议 第 6 条","组合久期偏离基准超过 0.5 年需提示。","已引用"],["内部风控制度 第 7.1 条","接近预警线需人工确认。","已引用"]],tree:[["交易指令","24 国开 05 5000 万","info"],["投资范围","允许","ok"],["久期偏离","接近阈值","warn"],["结论","人工确认","warn"]],explain:"该交易未违反基金合同投资范围，但买入后久期接近内部预警阈值，建议合规人员确认投资经理调仓依据后放行。",audit:["09:48 运行交易前校验","09:48 命中久期预警规则"]}];
    const state={id:"cm1"};const $=s=>document.querySelector(s);const cur=()=>tasks.find(t=>t.id===state.id)||tasks[0];const cls=s=>s==="通过"||s==="ok"?"ok":s==="预警"||s==="warn"?"warn":s==="阻断"||s==="bad"?"bad":"info";function tag(s){return `<span class="tag ${cls(s)}">${s}</span>`}function toast(s){const t=$("#toast");t.textContent=s;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1800)}
    function list(){const f=$("#statusFilter").value;$("#taskList").innerHTML=tasks.filter(t=>f==="all"||t.status===f).map(t=>`<button class="task ${t.id===state.id?"active":""}" data-id="${t.id}"><strong>${t.title}</strong><p>${t.product} · ${t.command}</p>${tag(t.status)}</button>`).join("");document.querySelectorAll(".task").forEach(b=>b.onclick=()=>{state.id=b.dataset.id;render();toast("已切换校验任务")})}
    function render(){const t=cur();$("#command").value=t.command;$("#summary").innerHTML=Object.entries(t.result).map(([k,v])=>`<div class="box"><span>${k}</span><strong>${v}</strong></div>`).join("");$("#rules").innerHTML=t.rules.map(r=>`<div class="rule ${r[1]==="阻断"?"block":r[1]==="预警"?"warn":""}"><i>${r[1]==="通过"?"✓":r[1]==="阻断"?"!":"?"}</i><div><strong>${r[0]}</strong><p>${r[2]}</p></div>${tag(r[1])}</div>`).join("");$("#clauses").innerHTML=t.clauses.map(c=>`<div class="clause"><strong>${c[0]}</strong><span>${c[1]}</span>${tag(c[2])}</div>`).join("");$("#tree").innerHTML=t.tree.map((r,i)=>`<div class="tree-row"><b>${i+1}</b><div><strong>${r[0]}</strong><div class="muted">${r[1]}</div></div>${tag(r[2])}</div>`).join("");$("#explain").value=t.explain;$("#audit").innerHTML=t.audit.map(a=>`<p>${a}</p>`).join("");list()}
    $("#statusFilter").onchange=list;$("#runBtn").onclick=()=>{const t=cur();t.command=$("#command").value;t.audit.unshift("刚刚 已重新运行交易前校验");if(t.command.includes("超过")||t.command.includes("8.4")){t.status="阻断";t.result.校验结果="阻断";t.result.处理建议="退回修改"}else{t.status="预警";t.result.校验结果="预警";t.result.处理建议="人工确认"}render();toast("校验结果已更新")};$("#explainBtn").onclick=()=>{cur().explain=$("#explain").value+"\\n\\n合规解释已生成，引用规则和合同条款已写入留痕。";cur().audit.unshift("刚刚 合规解释已生成");render();toast("合规解释已生成")};$("#reviewBtn").onclick=()=>{cur().audit.unshift("刚刚 已提交合规主管复核");render();toast("已提交复核")};$("#passBtn").onclick=()=>{cur().status="通过";cur().result.校验结果="通过";cur().result.处理建议="允许下单";cur().audit.unshift("刚刚 合规复核后放行");render();toast("任务已放行")};$("#blockBtn").onclick=()=>{cur().status="阻断";cur().result.校验结果="阻断";cur().result.处理建议="退回修改";cur().audit.unshift("刚刚 合规复核后阻断");render();toast("任务已阻断")};render();
  </script>
</body>
</html>
