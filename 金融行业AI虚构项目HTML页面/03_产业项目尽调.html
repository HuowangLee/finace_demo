<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产业项目尽调作战室</title>
  <style>
    :root{--bg:#eef1ec;--panel:#fffdfa;--ink:#1f2b24;--muted:#6f776f;--line:#d8ddd3;--soft:#f4f6ef;--blue:#4e6f3f;--blue2:#edf4e7;--green:#2e7a4f;--green2:#e6f3ea;--amber:#996b16;--amber2:#fff5da;--red:#a34236;--red2:#fff0ec;--shadow:0 14px 34px rgba(63,76,57,.12);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:linear-gradient(90deg,#e7ebe1 0,#f6f7f2 38%,#eef1ec 100%)}button,select,textarea,input{font:inherit}button{cursor:pointer}.page{min-height:100vh;display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px;padding:18px}.panel{border:1px solid var(--line);border-radius:6px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}.left{height:calc(100vh - 36px);position:sticky;top:18px;display:flex;flex-direction:column;background:#f9f7ef}.brand{padding:18px;border-bottom:1px solid var(--line);background:#eef2e8}.brand strong{display:block;font-size:20px}.muted,.brand span{color:var(--muted);font-size:12px}.filter{padding:14px;border-bottom:1px solid var(--line)}.input,.select,.textarea{width:100%;border:1px solid var(--line);border-radius:4px;padding:10px 11px;background:#fffdfa}.textarea{min-height:122px;line-height:1.6;resize:vertical}.projects{padding:12px;overflow:auto}.project{width:100%;margin-bottom:9px;border:1px solid transparent;border-left:4px solid #c8d3bd;border-radius:4px;padding:11px;text-align:left;background:#fff}.project.active,.project:hover{border-color:#cbd6c2;border-left-color:var(--blue);background:var(--blue2)}.project strong{display:block;font-size:14px}.project p{margin:6px 0;color:var(--muted);font-size:12px;line-height:1.55}.tag{display:inline-flex;border-radius:4px;padding:3px 7px;font-size:12px;font-weight:700}.ok{color:var(--green);background:var(--green2)}.warn{color:var(--amber);background:var(--amber2)}.bad{color:var(--red);background:var(--red2)}.info{color:var(--blue);background:var(--blue2)}.main{min-width:0}.top{display:flex;justify-content:space-between;gap:16px;margin-bottom:14px;padding:4px 0}.top h1{margin:0 0 5px;font-size:25px}.user{min-width:260px;border:1px solid var(--line);border-radius:4px;padding:11px 13px;background:#fffdfa}.flow{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:16px;border:1px solid var(--line);background:#fffdfa}.step{border-right:1px solid var(--line);padding:13px 14px;background:#fffdfa}.step:last-child{border-right:0}.step.done{background:var(--green2)}.step.active{background:var(--blue2);box-shadow:inset 0 -3px 0 var(--blue)}.step span{color:var(--muted);font-size:12px}.step strong{display:block;margin-top:5px;font-size:14px}.board{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}.card h2,.card h3{margin:0;padding:13px 15px;border-bottom:1px solid var(--line);font-size:15px;background:#fbfaf4}.body{padding:15px}.overview{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field{padding:11px;border:1px solid #e5e8df;border-radius:4px;background:var(--soft)}.field span{display:block;color:var(--muted);font-size:12px}.field strong{display:block;margin-top:5px;font-size:14px}.matrix{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.doc{min-height:80px;border:1px solid #e5e8df;border-radius:4px;padding:10px;background:#fff}.doc strong{display:block;font-size:13px}.doc span{display:block;margin-top:5px;color:var(--muted);font-size:12px}.tree{min-height:230px;position:relative;border:1px solid var(--line);border-radius:4px;background:#faf8ef}.node{position:absolute;min-width:106px;border:1px solid var(--line);border-radius:4px;padding:8px;text-align:center;background:#fffdfa}.node.main{border-color:#91a77c;background:var(--blue2)}.node.risk{border-color:#d99b91;background:var(--red2)}.line{position:absolute;height:3px;background:#b9c4ad;transform-origin:left center}.bars{display:grid;gap:10px}.barrow{display:grid;grid-template-columns:90px minmax(0,1fr) 62px;gap:10px;align-items:center;font-size:12px}.bar{height:10px;background:#e8eadf;overflow:hidden}.bar i{display:block;height:100%;background:var(--blue)}.issue{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;border:1px solid #e5e8df;border-left:4px solid var(--amber);border-radius:4px;padding:10px;margin-bottom:8px;background:#fff}.issue strong{font-size:13px}.issue p{margin:4px 0 0;color:var(--muted);font-size:12px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.btn{border:1px solid var(--line);border-radius:4px;padding:8px 11px;font-weight:700;background:#fffdfa}.primary{border-color:var(--blue);color:#fff;background:var(--blue)}.audit p{margin:0;padding:8px 0;border-bottom:1px solid #e5e8df;color:#59645a;font-size:12px}.toast{position:fixed;right:20px;bottom:20px;padding:11px 14px;border-radius:4px;color:#fff;background:#263326;opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}@media(max-width:1120px){.page{grid-template-columns:1fr}.left{position:static;height:auto}.board{grid-template-columns:1fr}.flow{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){.page{padding:10px}.top,.flow,.overview,.matrix{display:block}.panel,.user,.step,.doc{margin-bottom:10px}.node{position:static;margin:10px}.line{display:none}}
  </style>
</head>
<body>
  <div class="page">
    <aside class="panel left">
      <div class="brand"><strong>产业项目尽调</strong><span>投资管理公司 · 项目作战室</span></div>
      <div class="filter"><input class="input" id="keyword" placeholder="搜索项目、行业、资料缺口"><select class="select" id="statusFilter" style="margin-top:8px"><option value="all">全部状态</option><option value="需补材料">需补材料</option><option value="待复核">待复核</option><option value="已解析">已解析</option></select></div>
      <div class="projects" id="projectList"></div>
    </aside>
    <main class="main">
      <header class="top"><div><h1 id="title">项目尽调作战室</h1><p class="muted">围绕资料包、股权穿透、财务指标、风险问题和投决底稿完成会前准备。</p></div><div class="user"><strong>李经理</strong><br><span class="muted">产业投资部 · 今日值班复核人</span></div></header>
      <section class="flow" id="flow"></section>
      <section class="board">
        <article class="panel card"><h2>项目概览</h2><div class="body"><div class="overview" id="overview"></div><div class="actions"><button class="btn primary" id="refreshBtn">刷新资料</button><button class="btn" id="questionBtn">生成补充尽调问题</button></div></div></article>
        <article class="panel card"><h2>资料完整度矩阵</h2><div class="body matrix" id="docs"></div></article>
        <article class="panel card"><h2>股权穿透小图</h2><div class="body"><div class="tree" id="tree"></div></div></article>
        <article class="panel card"><h2>财务指标抽取</h2><div class="body bars" id="finance"></div></article>
        <article class="panel card"><h2>尽调问题看板</h2><div class="body" id="issues"></div></article>
        <article class="panel card"><h2>投决底稿草稿</h2><div class="body"><textarea class="textarea" id="memo"></textarea><div class="actions"><button class="btn primary" id="memoBtn">生成会前摘要</button><button class="btn" id="exportBtn">导出投决底稿</button></div><div class="audit" id="audit"></div></div></article>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const projects=[{id:"p1",name:"华东储能电站项目",industry:"储能",status:"需补材料",stage:2,summary:"拟投建设 200MWh 储能电站，商业计划书与可研报告已解析，电网接入批复和收益测算口径仍需补充。",fields:{投资规模:"6.8 亿元",IRR:"8.7%",回收期:"7.2 年",资料进度:"74%"},docs:[["商业计划书","已解析","ok"],["可研报告","已解析","ok"],["审计报告","待复核","warn"],["电网接入批复","缺失","bad"],["合作协议","已解析","ok"],["财务模型","待复核","warn"]],finance:[["收入预测",78,"年均 1.2 亿元"],["EBITDA",64,"毛利率假设待确认"],["现金流覆盖",58,"第 5 年转正"],["IRR 敏感性",46,"电价下降敏感"]],issues:[["电网接入批复缺失","需项目公司补充最终批复文件。","高"],["储能利用小时假设偏高","需与同区域历史项目对比。","中"],["运维成本口径不一致","可研与模型口径差异 8%。","中"]],memo:"初步判断：项目收益主要依赖容量租赁收入和辅助服务电价，建议会前重点复核电网接入批复、利用小时假设和运维成本口径。",audit:["10:12 资料完整度刷新","10:05 财务模型完成抽取","09:50 生成首版尽调问题"]},{id:"p2",name:"西北绿氢制储一体化",industry:"氢能",status:"待复核",stage:3,summary:"制氢与储运环节资料较完整，核心风险集中在下游消纳协议和电价补贴持续性。",fields:{投资规模:"12.4 亿元",IRR:"7.9%",回收期:"8.8 年",资料进度:"82%"},docs:[["商业计划书","已解析","ok"],["可研报告","已解析","ok"],["环评材料","已解析","ok"],["消纳协议","待复核","warn"],["财务模型","已解析","ok"],["政策文件","待复核","warn"]],finance:[["收入预测",72,"消纳协议待复核"],["EBITDA",61,"电价补贴影响"],["现金流覆盖",52,"第 6 年转正"],["IRR 敏感性",68,"补贴退坡敏感"]],issues:[["消纳协议约束不足","需确认最小采购量和违约责任。","高"],["政策补贴持续性","需更新地方补贴政策。","中"]],memo:"初步判断：项目具备产业协同价值，但财务收益对补贴与消纳协议依赖较强，建议进入补充尽调。",audit:["09:42 政策文件完成解析","09:35 生成会前摘要"]}];
    const state={id:"p1"};const $=s=>document.querySelector(s);const cur=()=>projects.find(p=>p.id===state.id)||projects[0];const cls=s=>s==="已解析"||s==="ok"||s==="低"?"ok":s==="待复核"||s==="需补材料"||s==="warn"||s==="中"?"warn":"bad";function tag(s){return `<span class="tag ${cls(s)}">${s}</span>`}function toast(s){const t=$("#toast");t.textContent=s;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1800)}
    function list(){const kw=$("#keyword").value.trim(),st=$("#statusFilter").value;$("#projectList").innerHTML=projects.filter(p=>(st==="all"||p.status===st)&&(!kw||`${p.name}${p.industry}${p.summary}`.includes(kw))).map(p=>`<button class="project ${p.id===state.id?"active":""}" data-id="${p.id}"><strong>${p.name}</strong><p>${p.industry} · ${p.summary}</p>${tag(p.status)}</button>`).join("")||"<p class='muted'>未找到匹配项目。</p>";document.querySelectorAll(".project").forEach(b=>b.onclick=()=>{state.id=b.dataset.id;render();toast("已切换项目")})}
    function tree(p){$("#tree").innerHTML=`<div class="line" style="left:150px;top:78px;width:150px;transform:rotate(18deg)"></div><div class="line" style="left:150px;top:78px;width:150px;transform:rotate(-18deg)"></div><div class="line" style="left:250px;top:148px;width:120px;transform:rotate(14deg)"></div><div class="node main" style="left:28px;top:70px"><strong>能源集团</strong><span>控股 62%</span></div><div class="node" style="left:230px;top:32px"><strong>项目公司</strong><span>${p.name}</span></div><div class="node risk" style="left:428px;top:106px"><strong>合作方</strong><span>回购条款待核</span></div><div class="node" style="left:234px;top:168px"><strong>运营主体</strong><span>新设 SPV</span></div>`}
    function render(){const p=cur();$("#title").textContent=p.name;$("#flow").innerHTML=["资料包","结构化解析","风险问题","投决底稿"].map((s,i)=>`<div class="step ${i<p.stage?"done":i===p.stage?"active":""}"><span>步骤 ${i+1}</span><strong>${s}</strong></div>`).join("");$("#overview").innerHTML=Object.entries(p.fields).map(([k,v])=>`<div class="field"><span>${k}</span><strong>${v}</strong></div>`).join("");$("#docs").innerHTML=p.docs.map(d=>`<div class="doc"><strong>${d[0]}</strong><span>${d[1]}</span>${tag(d[2])}</div>`).join("");tree(p);$("#finance").innerHTML=p.finance.map(f=>`<div class="barrow"><strong>${f[0]}</strong><div class="bar"><i style="width:${f[1]}%"></i></div><span>${f[2]}</span></div>`).join("");$("#issues").innerHTML=p.issues.map((i,n)=>`<div class="issue"><div><strong>${i[0]}</strong><p>${i[1]}</p></div>${tag(i[2])}<button class="btn issueBtn" data-i="${n}">处理</button></div>`).join("");$("#memo").value=p.memo;$("#audit").innerHTML=p.audit.map(a=>`<p>${a}</p>`).join("");list();document.querySelectorAll(".issueBtn").forEach(b=>b.onclick=()=>{p.audit.unshift("刚刚 尽调问题已标记为处理中");render();toast("尽调问题已更新")})}
    $("#refreshBtn").onclick=()=>{cur().audit.unshift("刚刚 资料包状态已刷新");render();toast("资料状态已刷新")};$("#questionBtn").onclick=()=>{cur().issues.unshift(["新增补充问题","请项目公司补充关键合同原件与收益测算说明。","中"]);cur().audit.unshift("刚刚 已生成补充尽调问题");render();toast("补充尽调问题已生成")};$("#memoBtn").onclick=()=>{cur().memo=$("#memo").value+"\\n\\n会前摘要已生成：建议围绕资料缺口、收益假设和风险缓释措施进行讨论。";cur().audit.unshift("刚刚 会前摘要已生成");render();toast("会前摘要已生成")};$("#exportBtn").onclick=()=>{cur().audit.unshift("刚刚 投决底稿已加入导出队列");render();toast("投决底稿已加入导出队列")};$("#keyword").oninput=list;$("#statusFilter").onchange=list;render();
  </script>
</body>
</html>
