<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户资金流异常研判台</title>
  <style>
    :root{--bg:#f6f2f0;--panel:#fff;--ink:#281f1f;--muted:#746866;--line:#dfd4d1;--soft:#fbf6f4;--blue:#6b4b72;--blue2:#f0e7f2;--green:#26765a;--green2:#e5f2eb;--amber:#a06613;--amber2:#fff1d9;--red:#bc3b34;--red2:#fff0ee;--shadow:0 14px 34px rgba(83,43,39,.12);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,select,input{font:inherit}button{cursor:pointer}.page{min-height:100vh;padding:18px;background:#f6f2f0}.top{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:16px;align-items:start;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}.top h1{margin:0 0 5px;font-size:25px}.muted{color:var(--muted);font-size:12px}.user{border:1px solid var(--line);border-radius:4px;padding:10px 12px;background:#fff}.layout{display:grid;grid-template-columns:310px minmax(0,1fr) 330px;gap:16px}.panel{border:1px solid var(--line);border-radius:4px;background:#fff;box-shadow:var(--shadow);overflow:hidden}.panel h2,.panel h3{margin:0;padding:13px 14px;border-bottom:1px solid var(--line);font-size:15px;background:#fbf6f4}.body{padding:14px}.select,.input{width:100%;border:1px solid var(--line);border-radius:3px;padding:9px 10px;background:#fff}.alert{display:block;width:100%;margin-top:9px;border:1px solid var(--line);border-left:5px solid #d2a09a;border-radius:3px;padding:10px;text-align:left;background:#fff}.alert.active,.alert:hover{border-color:#c88982;border-left-color:var(--red);background:var(--red2)}.alert strong{display:block}.alert p{margin:5px 0;color:var(--muted);font-size:12px;line-height:1.5}.tag{display:inline-flex;border-radius:3px;padding:3px 8px;font-size:12px;font-weight:700}.ok{color:var(--green);background:var(--green2)}.warn{color:var(--amber);background:var(--amber2)}.bad{color:var(--red);background:var(--red2)}.info{color:var(--blue);background:var(--blue2)}.canvas{display:grid;grid-template-columns:minmax(0,1fr) 270px;gap:14px}.graph{min-height:390px;position:relative;border:1px solid var(--line);border-radius:3px;background:repeating-linear-gradient(0deg,#fff 0,#fff 31px,#f7eeee 32px),repeating-linear-gradient(90deg,transparent 0,transparent 31px,#f7eeee 32px)}.node{position:absolute;width:112px;border:1px solid var(--line);border-radius:3px;padding:9px;text-align:center;background:#fff;box-shadow:0 8px 18px rgba(83,43,39,.12)}.node.main{border-color:#ad8bb6;background:var(--blue2)}.node.risk{border-color:#dc8f88;background:var(--red2)}.node strong{display:block;font-size:13px}.node span{font-size:12px;color:var(--muted)}.line{position:absolute;height:3px;border-radius:0;background:var(--amber);transform-origin:left center}.line.bad{background:var(--red)}.flow-card{padding:10px;border:1px solid #eadedb;border-left:4px solid var(--amber);border-radius:3px;margin-bottom:8px;background:#fff}.flow-card strong{display:block;font-size:13px}.flow-card span{color:var(--muted);font-size:12px}.timeline{display:grid;gap:9px}.event{display:grid;grid-template-columns:78px minmax(0,1fr) auto;gap:9px;padding:10px;border:1px solid #eadedb;border-radius:3px;background:#fff}.event time{color:var(--muted);font-size:12px}.event strong{display:block;font-size:13px}.event p{margin:4px 0 0;color:var(--muted);font-size:12px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.btn{border:1px solid var(--line);border-radius:3px;padding:8px 11px;font-weight:700;background:#fff}.primary{border-color:var(--red);color:#fff;background:var(--red)}.audit p{margin:0;padding:8px 0;border-bottom:1px solid #eadedb;color:#5f504f;font-size:12px}.toast{position:fixed;right:20px;bottom:20px;padding:11px 14px;border-radius:3px;color:#fff;background:#281f1f;opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}@media(max-width:1180px){.layout{grid-template-columns:280px minmax(0,1fr)}.side{grid-column:1/-1}.canvas{grid-template-columns:1fr}}@media(max-width:760px){.layout,.top{display:block}.panel,.user{margin-bottom:10px}.graph{min-height:520px}.node{position:static;margin:10px}.line{display:none}}
  </style>
</head>
<body>
  <div class="page">
    <header class="top"><div><h1>资金链路研判台</h1><p class="muted">围绕可疑账户群查看资金流向、异常模式、核查建议和研判留痕。</p></div><div class="user"><strong>反洗钱研判岗</strong><br><span class="muted">城市商业银行 · 反洗钱中心</span></div></header>
    <section class="layout">
      <aside class="panel"><h2>预警队列</h2><div class="body"><select class="select" id="riskFilter"><option value="all">全部风险</option><option value="高风险">高风险</option><option value="中风险">中风险</option></select><div id="alertList"></div></div></aside>
      <main>
        <section class="panel"><h2 id="caseTitle">案件研判画布</h2><div class="body canvas"><div class="graph" id="graph"></div><div id="flowSummary"></div></div></section>
        <section class="panel" style="margin-top:14px"><h2>交易时间线</h2><div class="body timeline" id="timeline"></div></section>
      </main>
      <aside class="panel side"><h2>研判结论</h2><div class="body"><div id="judgement"></div><div class="actions"><button class="btn primary" id="summaryBtn">生成案件摘要</button><button class="btn" id="reviewBtn">提交人工复核</button><button class="btn" id="reportBtn">准备报送材料</button></div><h3 style="border:0;padding:16px 0 8px">研判留痕</h3><div class="audit" id="audit"></div></div></aside>
    </section>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const cases=[{id:"a1",title:"A-240618 快进快出账户群",risk:"高风险",pattern:"分散转入集中转出",main:"6217 **** 8921",summary:"12 个自然人账户在 36 小时内分散转入同一对公账户，并在次日集中转出至外地空壳企业。",nodes:[["核心账户","赵某 8921","main",42,130],["对公账户","某商贸公司","risk",248,62],["外地企业","华南贸易","risk",506,126],["自然人群","12 个账户","",126,260],["现金归集","柜面取现","risk",396,265]],flows:[["自然人群 -> 核心账户","18 笔 / 312 万","高频小额转入"],["核心账户 -> 对公账户","4 笔 / 298 万","次日集中转出"],["对公账户 -> 外地企业","2 笔 / 286 万","空壳企业命中"],["外地企业 -> 现金归集","1 笔 / 180 万","柜面取现"]],timeline:[["06-18 09:20","分散入账","12 个账户开始向核心账户转入。","入账"],["06-18 17:45","集中归集","核心账户向对公账户转出 298 万。","转出"],["06-19 10:12","跨区域转出","资金转至外地企业账户。","高风险"],["06-19 15:30","柜面取现","外地企业发生大额取现。","高风险"]],audit:["10:18 命中快进快出规则","10:20 账户群聚类完成","10:23 空壳企业名单匹配"],actions:["建议核查核心账户开户资料与交易背景。","建议联系网点补充柜面取现影像。","达到可疑交易报告准备条件。"]},{id:"a2",title:"B-240621 循环交易线索",risk:"中风险",pattern:"循环交易",main:"6222 **** 1308",summary:"三家关联企业之间存在多轮同额往返交易，交易说明相似，缺少真实贸易单据。",nodes:[["主体 A","制造公司","main",62,120],["主体 B","供应链公司","risk",280,80],["主体 C","贸易公司","",500,138],["共同法人","王某","risk",260,270]],flows:[["主体 A -> 主体 B","5 笔 / 860 万","同额往返"],["主体 B -> 主体 C","5 笔 / 842 万","交易说明相似"],["主体 C -> 主体 A","4 笔 / 818 万","资金回流"],["共同法人关联","3 家企业","工商关联"]],timeline:[["06-21 10:00","首笔转出","主体 A 转入供应链公司。","转出"],["06-21 14:20","链路延伸","主体 B 转至主体 C。","转出"],["06-22 11:10","资金回流","主体 C 转回主体 A。","关注"]],audit:["09:42 命中循环交易规则","09:44 工商关联完成匹配"],actions:["建议补充贸易合同与发票。","建议对共同法人名下账户扩展排查。"]}];
    const state={id:"a1"};const $=s=>document.querySelector(s);const cur=()=>cases.find(c=>c.id===state.id)||cases[0];const cls=s=>s==="高风险"?"bad":s==="中风险"||s==="关注"||s==="转出"?"warn":s==="入账"?"info":"ok";function tag(s){return `<span class="tag ${cls(s)}">${s}</span>`}function toast(s){const t=$("#toast");t.textContent=s;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1800)}
    function list(){const f=$("#riskFilter").value;$("#alertList").innerHTML=cases.filter(c=>f==="all"||c.risk===f).map(c=>`<button class="alert ${c.id===state.id?"active":""}" data-id="${c.id}"><strong>${c.title}</strong><p>${c.pattern} · ${c.summary}</p>${tag(c.risk)}</button>`).join("");document.querySelectorAll(".alert").forEach(b=>b.onclick=()=>{state.id=b.dataset.id;render();toast("已切换预警案件")})}
    function graph(c){$("#graph").innerHTML=`<div class="line bad" style="left:140px;top:143px;width:145px;transform:rotate(-20deg)"></div><div class="line bad" style="left:335px;top:110px;width:165px;transform:rotate(18deg)"></div><div class="line" style="left:187px;top:250px;width:220px;transform:rotate(-12deg)"></div>${c.nodes.map(n=>`<div class="node ${n[2]}" style="left:${n[3]}px;top:${n[4]}px"><strong>${n[0]}</strong><span>${n[1]}</span></div>`).join("")}`}
    function render(){const c=cur();$("#caseTitle").textContent=`${c.title} · ${c.pattern}`;graph(c);$("#flowSummary").innerHTML=c.flows.map(f=>`<div class="flow-card"><strong>${f[0]}</strong><span>${f[1]} · ${f[2]}</span></div>`).join("");$("#timeline").innerHTML=c.timeline.map(e=>`<div class="event"><time>${e[0]}</time><div><strong>${e[1]}</strong><p>${e[2]}</p></div>${tag(e[3])}</div>`).join("");$("#judgement").innerHTML=`<p>${c.summary}</p>${tag(c.risk)} ${tag(c.pattern)}<div style="margin-top:12px">${c.actions.map(a=>`<div class="flow-card"><strong>${a}</strong></div>`).join("")}</div>`;$("#audit").innerHTML=c.audit.map(a=>`<p>${a}</p>`).join("");list()}
    $("#riskFilter").onchange=list;$("#summaryBtn").onclick=()=>{cur().audit.unshift("刚刚 案件摘要已生成");render();toast("案件摘要已生成")};$("#reviewBtn").onclick=()=>{cur().audit.unshift("刚刚 已提交人工复核");render();toast("已提交人工复核")};$("#reportBtn").onclick=()=>{cur().audit.unshift("刚刚 报送材料准备任务已创建");render();toast("报送材料任务已创建")};render();
  </script>
</body>
</html>
