<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交易指令辅助工作台</title>
  <style>
    :root{--bg:#10151b;--panel:#17212b;--ink:#eef4f7;--muted:#93a4af;--line:#2a3947;--soft:#111a23;--blue:#2f9bb3;--blue2:#163542;--green:#4abf83;--green2:#17362b;--amber:#e2a74f;--amber2:#3c2d17;--red:#e26458;--red2:#3b201f;--shadow:0 18px 42px rgba(0,0,0,.26);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,textarea,select,input{font:inherit}button{cursor:pointer}.page{min-height:100vh;display:grid;grid-template-columns:360px minmax(0,1fr);gap:0}.panel{border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow)}.queue{height:100vh;position:sticky;top:0;display:flex;flex-direction:column;overflow:hidden;border-width:0 1px 0 0}.head{padding:20px;border-bottom:1px solid var(--line);background:#121b24}.head h1{margin:0 0 6px;font-size:20px}.head p,.muted{margin:0;color:var(--muted);font-size:12px}.filters{padding:14px;border-bottom:1px solid var(--line)}.select,.textarea,.input{width:100%;border:1px solid var(--line);border-radius:4px;padding:10px 11px;color:var(--ink);background:#0f171f}.textarea{min-height:132px;line-height:1.6;resize:vertical}.orders{padding:12px;overflow:auto}.order{display:block;width:100%;margin-bottom:10px;border:1px solid var(--line);border-left:4px solid #3d5160;border-radius:4px;padding:11px;text-align:left;color:var(--ink);background:#121c25}.order.active,.order:hover{border-color:#46778a;border-left-color:var(--blue);background:var(--blue2)}.tag{display:inline-flex;border-radius:3px;padding:3px 7px;font-size:12px;font-weight:700}.ok{color:#b8f2d1;background:var(--green2)}.warn{color:#ffd999;background:var(--amber2)}.bad{color:#ffb8b2;background:var(--red2)}.info{color:#bdefff;background:var(--blue2)}.main{min-width:0;padding:18px}.top{display:flex;justify-content:space-between;gap:16px;margin-bottom:16px}.top h2{margin:0 0 5px;font-size:24px}.user{min-width:240px;border:1px solid var(--line);border-radius:4px;padding:10px 12px;background:#121c25}.desk{display:grid;grid-template-columns:1.02fr .98fr;gap:14px}.card{border:1px solid var(--line);border-radius:4px;background:#151f29;overflow:hidden}.card h3{margin:0;padding:13px 14px;border-bottom:1px solid var(--line);font-size:15px;background:#111a23}.body{padding:14px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.btn{border:1px solid #3c4c5a;border-radius:4px;padding:9px 12px;color:var(--ink);font-weight:700;background:#111a23}.primary{border-color:var(--blue);color:#061117;background:var(--blue)}.danger{border-color:var(--red);color:#ffd2ce;background:#2a1818}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field{padding:10px;border:1px solid #253443;border-radius:4px;background:var(--soft)}.field span{display:block;color:var(--muted);font-size:12px}.field strong{display:block;margin-top:5px;font-size:14px}.check{display:grid;grid-template-columns:24px minmax(0,1fr) auto;gap:9px;align-items:start;padding:10px;border:1px solid #253443;border-radius:4px;margin-bottom:8px;background:#111a23}.check i{display:grid;width:24px;height:24px;place-items:center;border-radius:3px;color:#061117;font-style:normal;font-size:12px;background:var(--blue)}.check.block i{background:var(--red)}.check.warn i{background:var(--amber)}.check strong{font-size:13px}.check p{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.5}.stepper{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}.step{padding:11px;border:1px solid var(--line);border-radius:4px;background:#101821}.step.active{border-color:var(--blue);background:var(--blue2)}.step.done{border-color:#377a5d;background:var(--green2)}.step span{color:var(--muted);font-size:12px}.step strong{display:block;margin-top:4px;font-size:13px}.liquidity{display:grid;gap:8px}.barline{display:grid;grid-template-columns:84px minmax(0,1fr) 56px;gap:10px;align-items:center;font-size:12px}.bar{height:8px;border-radius:2px;background:#263342;overflow:hidden}.bar i{display:block;height:100%;background:var(--blue)}.audit{max-height:230px;overflow:auto}.audit p{margin:0;padding:8px 0;border-bottom:1px solid #253443;color:#aebbc3;font-size:12px}.toast{position:fixed;right:20px;bottom:20px;padding:11px 14px;border-radius:4px;color:#061117;background:#78d5e5;opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}@media(max-width:1080px){.page{grid-template-columns:1fr}.queue{position:static;height:auto;border-right:0}.desk{grid-template-columns:1fr}}@media(max-width:680px){.main,.page{padding:10px}.top,.grid,.stepper{display:block}.user,.step,.field{margin-top:8px}}
  </style>
</head>
<body>
  <div class="page">
    <aside class="panel queue">
      <div class="head"><h1>交易指令辅助</h1><p>交易室 · 指令解析与执行确认</p></div>
      <div class="filters"><select class="select" id="statusFilter"><option value="all">全部指令</option><option value="待确认">待确认</option><option value="预警">预警</option><option value="可执行">可执行</option><option value="需修改">需修改</option></select></div>
      <div class="orders" id="orderList"></div>
    </aside>
    <main class="main">
      <header class="top"><div><h2>交易员执行台</h2><p class="muted">解析自然语言指令，完成交易前校验、流动性判断和人工确认。</p></div><div class="user"><strong>王交易员</strong><br><span class="muted">固收与权益执行 · 今日值班</span></div></header>
      <section class="stepper" id="steps"></section>
      <section class="desk">
        <article class="card"><h3>自然语言指令</h3><div class="body"><textarea class="textarea" id="intent"></textarea><div class="actions"><button class="btn primary" id="parseBtn">解析为要素草案</button><button class="btn" id="reloadBtn">刷新行情与额度</button></div></div></article>
        <article class="card"><h3>标准化要素草案</h3><div class="body"><div class="grid" id="draft"></div><div class="actions"><button class="btn primary" id="confirmBtn">确认进入执行</button><button class="btn danger" id="returnBtn">退回修改</button></div></div></article>
        <article class="card"><h3>交易前校验</h3><div class="body" id="checks"></div></article>
        <article class="card"><h3>流动性与拆单提示</h3><div class="body"><div class="liquidity" id="liquidity"></div></div></article>
        <article class="card" style="grid-column:1/-1"><h3>审计留痕</h3><div class="body audit" id="audit"></div></article>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const orders=[{id:"o1",title:"买入 24 国开 05",status:"待确认",stage:2,intent:"固收专户 A 买入 24 国开 05，金额 3000 万，价格不高于 101.12，今天完成。",draft:{账户:"固收专户 A",方向:"买入",标的:"24 国开 05",数量:"3000 万",价格约束:"<=101.12",时效:"今日完成"},checks:[["投资范围","通过","账户允许政策性金融债。"],["集中度","通过","买入后单券占比 3.8%。"],["价格偏离","预警","报价高于中债估值 6bp，需交易员确认。"],["剩余额度","通过","剩余额度 1.4 亿元。"]],liq:[["盘口深度",82],["近 20 日成交",74],["价差稳定度",58]],audit:["10:11 收到投资经理指令","10:12 AI 完成要素解析","10:13 价格偏离预警待确认"]},{id:"o2",title:"卖出 新能源 ETF",status:"预警",stage:2,intent:"组合 B 卖出新能源 ETF 800 万份，尽量不冲击收盘价。",draft:{账户:"组合 B",方向:"卖出",标的:"新能源 ETF",数量:"800 万份",价格约束:"贴近 VWAP",时效:"今日分批"},checks:[["投资范围","通过","账户允许 ETF 交易。"],["流动性","预警","数量超过近 5 日均成交 12%。"],["集中度","通过","卖出后权益仓位 18.6%。"],["黑名单","通过","未命中限制名单。"]],liq:[["盘口深度",54],["近 20 日成交",66],["价差稳定度",46]],audit:["09:52 收到投资经理指令","09:53 AI 建议分 4 笔执行","09:54 流动性预警待确认"]},{id:"o3",title:"买入 城投债",status:"需修改",stage:1,intent:"买入某省城投债 5000 万，收益率 3.1 左右。",draft:{账户:"待补充",方向:"买入",标的:"某省城投债",数量:"5000 万",价格约束:"收益率约 3.1%",时效:"未说明"},checks:[["账户信息","阻断","缺少交易账户。"],["主体准入","预警","需补充发行人名称后校验。"],["剩余额度","阻断","账户缺失无法计算额度。"]],liq:[["盘口深度",32],["近 20 日成交",28],["价差稳定度",35]],audit:["09:10 收到模糊指令","09:11 已退回补充账户和发行人"]}];
    const state={id:"o1"};const $=s=>document.querySelector(s);const cur=()=>orders.find(o=>o.id===state.id)||orders[0];const cls=s=>s==="通过"||s==="可执行"?"ok":s==="预警"||s==="待确认"?"warn":s==="阻断"||s==="需修改"?"bad":"info";function tag(s){return `<span class="tag ${cls(s)}">${s}</span>`}function toast(s){const t=$("#toast");t.textContent=s;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1800)}
    function list(){const f=$("#statusFilter").value;$("#orderList").innerHTML=orders.filter(o=>f==="all"||o.status===f).map(o=>`<button class="order ${o.id===state.id?"active":""}" data-id="${o.id}"><strong>${o.title}</strong><p>${o.intent}</p>${tag(o.status)}</button>`).join("");document.querySelectorAll(".order").forEach(b=>b.onclick=()=>{state.id=b.dataset.id;render();toast("已切换指令")})}
    function render(){const o=cur();$("#intent").value=o.intent;$("#steps").innerHTML=["接收指令","要素解析","交易前校验","人工确认"].map((s,i)=>`<div class="step ${i<o.stage?"done":i===o.stage?"active":""}"><span>步骤 ${i+1}</span><strong>${s}</strong></div>`).join("");$("#draft").innerHTML=Object.entries(o.draft).map(([k,v])=>`<div class="field"><span>${k}</span><strong>${v}</strong></div>`).join("");$("#checks").innerHTML=o.checks.map(c=>`<div class="check ${c[1]==="阻断"?"block":c[1]==="预警"?"warn":""}"><i>${c[1]==="通过"?"✓":c[1]==="阻断"?"!":"?"}</i><div><strong>${c[0]}</strong><p>${c[2]}</p></div>${tag(c[1])}</div>`).join("");$("#liquidity").innerHTML=o.liq.map(l=>`<div class="barline"><strong>${l[0]}</strong><div class="bar"><i style="width:${l[1]}%"></i></div><span>${l[1]}%</span></div>`).join("");$("#audit").innerHTML=o.audit.map(a=>`<p>${a}</p>`).join("");list()}
    $("#parseBtn").onclick=()=>{const o=cur();o.intent=$("#intent").value;o.stage=Math.max(o.stage,2);o.status=o.checks.some(c=>c[1]==="阻断")?"需修改":"待确认";o.audit.unshift("刚刚 已根据输入重新解析要素草案");render();toast("要素草案已更新")};$("#confirmBtn").onclick=()=>{const o=cur();if(o.checks.some(c=>c[1]==="阻断")){o.status="需修改";o.audit.unshift("刚刚 命中阻断项，无法确认执行");toast("存在阻断项，已保持退回状态")}else{o.status="可执行";o.stage=3;o.audit.unshift("刚刚 交易员确认进入执行流程");toast("指令已确认进入执行")}render()};$("#returnBtn").onclick=()=>{const o=cur();o.status="需修改";o.stage=1;o.audit.unshift("刚刚 已退回投资经理补充或修改");render();toast("指令已退回修改")};$("#reloadBtn").onclick=()=>{cur().audit.unshift("刚刚 行情、额度和名单状态已刷新");render();toast("行情与额度已刷新")};$("#statusFilter").onchange=list;render();
  </script>
</body>
</html>
