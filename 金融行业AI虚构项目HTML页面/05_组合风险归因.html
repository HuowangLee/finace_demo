<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组合风险归因分析台</title>
  <style>
    :root{--bg:#f3f1ee;--panel:#fffaf4;--ink:#26231f;--muted:#746d64;--line:#ded6cc;--soft:#f7f1e8;--blue:#7a5430;--blue2:#f0e4d6;--green:#3f7b53;--green2:#e6f1e7;--amber:#9d6a12;--amber2:#fff2d6;--red:#a94035;--red2:#fff0ec;--shadow:0 14px 32px rgba(84,63,43,.12);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,select{font:inherit}button{cursor:pointer}.page{min-height:100vh;padding:18px;background:linear-gradient(180deg,#f6f2eb 0,#eee9e1 100%)}.top{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:16px;align-items:start;margin-bottom:16px}.top h1{margin:0 0 5px;font-size:25px}.muted{color:var(--muted);font-size:12px}.user{border:1px solid var(--line);border-radius:6px;padding:11px 12px;background:#fffaf4}.grid{display:grid;grid-template-columns:300px minmax(0,1fr) 330px;gap:16px}.panel{border:1px solid var(--line);border-radius:6px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}.panel h2,.panel h3{margin:0;padding:13px 14px;border-bottom:1px solid var(--line);font-size:15px;background:#f8efe3}.body{padding:14px}.select{width:100%;border:1px solid var(--line);border-radius:4px;padding:9px 10px;background:#fffdf9}.portfolio{width:100%;margin-top:9px;border:1px solid #e4d9cc;border-left:5px solid #c8a782;border-radius:4px;padding:10px;text-align:left;background:#fffdf9}.portfolio.active,.portfolio:hover{border-color:#c9b295;border-left-color:var(--blue);background:var(--blue2)}.portfolio strong{display:block}.portfolio span{font-size:12px;color:var(--muted)}.tag{display:inline-flex;border-radius:4px;padding:3px 8px;font-size:12px;font-weight:700}.ok{color:var(--green);background:var(--green2)}.warn{color:var(--amber);background:var(--amber2)}.bad{color:var(--red);background:var(--red2)}.info{color:var(--blue);background:var(--blue2)}.metrics{display:grid;grid-template-columns:1.1fr .9fr .9fr 1fr;gap:10px;margin-bottom:16px}.metric{border:1px solid var(--line);border-radius:6px;padding:13px;background:#fffdf9}.metric span{display:block;color:var(--muted);font-size:12px}.metric strong{display:block;margin-top:5px;font-size:25px}.dashboard{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}.waterfall{display:grid;gap:10px}.wf{display:grid;grid-template-columns:96px minmax(0,1fr) 62px;gap:10px;align-items:center;font-size:12px}.bar{height:14px;border-radius:3px;background:#ece2d6;overflow:hidden}.bar i{display:block;height:100%;background:var(--blue)}.bar.negative i{float:right;background:var(--red)}.factor{display:grid;grid-template-columns:88px minmax(0,1fr) 52px;gap:10px;align-items:center;font-size:12px}.heat{height:12px;border-radius:3px;background:#ece2d6;overflow:hidden}.heat i{display:block;height:100%;background:linear-gradient(90deg,#6da975,#d8a041,#c65345)}.drawdown{display:grid;gap:9px}.dd{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:10px;border:1px solid #eadfd2;border-radius:4px;background:#fffdf9}.dd strong{font-size:13px}.dd p{margin:4px 0 0;color:var(--muted);font-size:12px}.stress{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.scenario{padding:10px;border:1px solid #eadfd2;border-radius:4px;background:var(--soft)}.scenario span{color:var(--muted);font-size:12px}.scenario strong{display:block;margin-top:5px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{border:1px solid var(--line);border-radius:4px;padding:8px 11px;font-weight:700;background:#fffdf9}.primary{border-color:var(--blue);color:#fff;background:var(--blue)}.audit p{margin:0;padding:8px 0;border-bottom:1px solid #eadfd2;color:#5f574f;font-size:12px}.toast{position:fixed;right:20px;bottom:20px;padding:11px 14px;border-radius:4px;color:#fff;background:#3c2d21;opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}@media(max-width:1180px){.grid{grid-template-columns:280px minmax(0,1fr)}.side{grid-column:1/-1}.dashboard{grid-template-columns:1fr}}@media(max-width:760px){.grid,.metrics,.stress,.top{display:block}.panel,.metric,.user{margin-bottom:10px}}
  </style>
</head>
<body>
  <div class="page">
    <header class="top"><div><h1>组合风险归因分析台</h1><p class="muted">解释收益、回撤和风险暴露来源，生成内部复盘与客户沟通口径。</p></div><div class="user"><strong>周经理</strong><br><span class="muted">混合资产投资部 · 风险复盘负责人</span></div></header>
    <section class="grid">
      <aside class="panel"><h2>组合选择</h2><div class="body"><select class="select" id="typeFilter"><option value="all">全部产品</option><option value="固收+">固收+</option><option value="混合">混合</option><option value="专户">专户</option></select><div id="portfolioList"></div></div></aside>
      <main>
        <div class="metrics" id="metrics"></div>
        <section class="dashboard">
          <article class="panel"><h2>收益贡献瀑布</h2><div class="body waterfall" id="returns"></div></article>
          <article class="panel"><h2>风险因子暴露</h2><div class="body waterfall" id="factors"></div></article>
          <article class="panel"><h2>回撤来源</h2><div class="body drawdown" id="drawdowns"></div></article>
          <article class="panel"><h2>压力测试</h2><div class="body"><div class="stress" id="stress"></div><div class="actions"><button class="btn primary" id="reportBtn">生成复盘摘要</button><button class="btn" id="refreshBtn">刷新估值与因子</button></div></div></article>
        </section>
      </main>
      <aside class="panel side"><h2>复盘记录</h2><div class="body"><div id="summary"></div><div class="audit" id="audit"></div></div></aside>
    </section>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const portfolios=[{id:"p1",name:"固收+稳健1号",type:"固收+",status:"触发复盘",nav:"1.0832",day:"-0.42%",draw:"-3.8%",summary:"本周波动主要来自久期拉长后的利率冲击和转债仓位回撤。",returns:[["票息收入","+0.34%",68],["利率变动","-0.41%",82],["信用利差","-0.12%",24],["权益/转债","-0.23%",46],["费用与现金","-0.03%",10]],factors:[["久期",78],["信用利差",42],["权益 Beta",36],["行业集中",28]],drawdowns:[["长久期国债","贡献 -1.2%","10Y 利率上行 8bp","高"],["新能源转债","贡献 -0.8%","正股回撤拖累","中"],["城投债利差","贡献 -0.3%","区域利差走阔","低"]],stress:[["利率 +25bp","净值 -1.1%"],["信用利差 +40bp","净值 -0.7%"],["权益 -5%","净值 -0.4%"],["综合冲击","净值 -2.0%"]],audit:["10:21 因子数据更新","10:18 触发复盘阈值","09:40 估值表同步"]},{id:"p2",name:"均衡成长专户",type:"专户",status:"待确认",nav:"0.9821",day:"-0.18%",draw:"-5.4%",summary:"主要回撤来自权益仓位和消费行业暴露，需确认是否降低单一行业集中度。",returns:[["股票选择","+0.12%",24],["行业配置","-0.36%",72],["交易成本","-0.04%",8],["现金管理","+0.02%",4]],factors:[["权益 Beta",72],["消费行业",58],["个股集中",44],["汇率",18]],drawdowns:[["消费龙头","贡献 -1.6%","估值压缩","高"],["医药持仓","贡献 -0.7%","政策预期扰动","中"]],stress:[["权益 -5%","净值 -2.7%"],["消费 -8%","净值 -1.6%"],["汇率 -2%","净值 -0.2%"],["综合冲击","净值 -3.4%"]],audit:["09:32 经理确认待办创建","09:10 行业因子更新"]},{id:"p3",name:"短债增强2号",type:"固收+",status:"正常监控",nav:"1.0217",day:"+0.05%",draw:"-0.6%",summary:"短久期和高等级持仓贡献稳定，当前无复盘阈值触发。",returns:[["票息收入","+0.09%",70],["利率变动","-0.02%",18],["信用利差","-0.01%",8],["费用与现金","-0.01%",6]],factors:[["久期",24],["信用利差",18],["流动性",20],["集中度",12]],drawdowns:[["短融持仓","贡献 -0.2%","估值微调","低"]],stress:[["利率 +25bp","净值 -0.2%"],["信用利差 +40bp","净值 -0.3%"],["流动性冲击","净值 -0.1%"],["综合冲击","净值 -0.5%"]],audit:["08:55 估值同步完成","08:30 因子模型更新"]}];
    const state={id:"p1"};const $=s=>document.querySelector(s);const cur=()=>portfolios.find(p=>p.id===state.id)||portfolios[0];const cls=s=>s==="正常监控"||s==="低"?"ok":s==="待确认"||s==="中"?"warn":s==="触发复盘"||s==="高"?"bad":"info";function tag(s){return `<span class="tag ${cls(s)}">${s}</span>`}function toast(s){const t=$("#toast");t.textContent=s;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),1800)}
    function list(){const f=$("#typeFilter").value;$("#portfolioList").innerHTML=portfolios.filter(p=>f==="all"||p.type===f).map(p=>`<button class="portfolio ${p.id===state.id?"active":""}" data-id="${p.id}"><strong>${p.name}</strong><span>${p.type} · 净值 ${p.nav} · ${p.day}</span><br>${tag(p.status)}</button>`).join("");document.querySelectorAll(".portfolio").forEach(b=>b.onclick=()=>{state.id=b.dataset.id;render();toast("已切换组合")})}
    function render(){const p=cur();$("#metrics").innerHTML=[["组合净值",p.nav,p.type],["日收益",p.day,"最新估值"],["最大回撤",p.draw,"当前周期"],["状态",p.status,"复盘规则"]].map(m=>`<div class="metric"><span>${m[0]}</span><strong>${m[1]}</strong><span>${m[2]}</span></div>`).join("");$("#returns").innerHTML=p.returns.map(r=>`<div class="wf"><strong>${r[0]}</strong><div class="bar ${r[1].startsWith("-")?"negative":""}"><i style="width:${r[2]}%"></i></div><span>${r[1]}</span></div>`).join("");$("#factors").innerHTML=p.factors.map(f=>`<div class="factor"><strong>${f[0]}</strong><div class="heat"><i style="width:${f[1]}%"></i></div><span>${f[1]}%</span></div>`).join("");$("#drawdowns").innerHTML=p.drawdowns.map(d=>`<div class="dd"><div><strong>${d[0]}</strong><p>${d[1]} · ${d[2]}</p></div>${tag(d[3])}</div>`).join("");$("#stress").innerHTML=p.stress.map(s=>`<div class="scenario"><span>${s[0]}</span><strong>${s[1]}</strong></div>`).join("");$("#summary").innerHTML=`<p>${p.summary}</p><div class="actions"><button class="btn primary" id="riskBtn">提交风控复核</button><button class="btn" id="clientBtn">导出客户版</button></div>`;$("#audit").innerHTML=p.audit.map(a=>`<p>${a}</p>`).join("");list();$("#riskBtn").onclick=()=>{p.audit.unshift("刚刚 已提交风控复核");render();toast("已提交风控复核")};$("#clientBtn").onclick=()=>toast("客户版说明已加入导出队列")}
    $("#typeFilter").onchange=list;$("#reportBtn").onclick=()=>{cur().audit.unshift("刚刚 已生成复盘摘要");render();toast("复盘摘要已生成")};$("#refreshBtn").onclick=()=>{cur().audit.unshift("刚刚 估值与因子已刷新");render();toast("估值与因子已刷新")};render();
  </script>
</body>
</html>
